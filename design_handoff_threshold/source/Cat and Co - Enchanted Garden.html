<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cat & Co · Enchanted Garden</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: #050817;
    color: #f4e3c4;
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  * { box-sizing: border-box; }
  ::selection { background: rgba(232, 184, 124, 0.35); color: #fff; }
  button { font-family: inherit; color: inherit; appearance: none; border: none; background: transparent; cursor: pointer; padding: 0; }

  /* sky base — deep blue-purple-teal night, with a teal moon-glow halo */
  .sky {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 60% 45% at 50% 22%, rgba(140, 175, 195, 0.32) 0%, rgba(80, 120, 160, 0.15) 30%, transparent 60%),
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(20, 35, 55, 0.85) 0%, transparent 70%),
      radial-gradient(ellipse 100% 70% at 30% 60%, rgba(40, 30, 80, 0.4) 0%, transparent 60%),
      linear-gradient(180deg, #08102a 0%, #0f1a3a 25%, #16204a 50%, #14233f 75%, #0a1530 100%);
  }

  @keyframes twinkle {
    0%, 100% { opacity: var(--op-max, 0.9); }
    50% { opacity: var(--op-min, 0.2); }
  }
  @keyframes drift {
    0% { transform: translate(0, 0); }
    50% { transform: translate(var(--dx, 8px), var(--dy, -10px)); }
    100% { transform: translate(0, 0); }
  }
  @keyframes float {
    0%, 100% { transform: translate(var(--ox,0), var(--oy,0)) scale(1); }
    50% { transform: translate(calc(var(--ox,0px) + var(--dx, 6px)), calc(var(--oy,0px) + var(--dy, -10px))) scale(1.04); }
  }
  @keyframes orbBreathe {
    0%, 100% { filter: brightness(1) saturate(1); }
    50% { filter: brightness(1.18) saturate(1.15); }
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  @keyframes firefly {
    0%   { transform: translate(0,0); opacity: 0; }
    10%  { opacity: 0.95; }
    50%  { transform: translate(var(--fx, 40px), var(--fy, -30px)); opacity: 1; }
    90%  { opacity: 0.9; }
    100% { transform: translate(calc(var(--fx,40px) * 2), calc(var(--fy,-30px) * 0.6)); opacity: 0; }
  }
  @keyframes lanternSway {
    0%, 100% { transform: translateX(-50%) rotate(-1.4deg); }
    50%      { transform: translateX(-50%) rotate(1.4deg); }
  }
  @keyframes lanternBreathe {
    0%, 100% { opacity: 0.85; filter: blur(14px); }
    50%      { opacity: 1;    filter: blur(11px); }
  }
  @keyframes lanternFlicker {
    0%, 100% { opacity: 0.85; transform: translate(-50%, -50%) scale(1); }
    25%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.05); }
    55%      { opacity: 0.78; transform: translate(-50%, -50%) scale(0.97); }
    78%      { opacity: 1;    transform: translate(-50%, -50%) scale(1.02); }
  }
  .star { animation: twinkle var(--dur, 4s) ease-in-out infinite; animation-delay: var(--delay, 0s); }
  .orb-float { animation: float 12s ease-in-out infinite; }
  .orb-breathe { animation: orbBreathe 5s ease-in-out infinite; }
  .lantern-flicker { animation: flicker 3s ease-in-out infinite; }
  .firefly { animation: firefly var(--dur, 12s) ease-in-out infinite; }
</style>
</head>
<body>
<div class="sky"></div>
<div id="root" style="position: relative; z-index: 1;"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="enchanted-garden.jsx"></script>
</body>
</html>
