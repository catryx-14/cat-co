<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Cat & Co · First Aid</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Italiana&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&display=swap" rel="stylesheet" />
<style>
  :root {
    --ink: #f4e3c4;
    --ink-soft: #e8f1f3;
    --ink-faint: #8aa8b3;

    /* state glow colors (rgb triplets — pushed warmer / brighter) */
    --glow-frazzled: 215, 220, 110;    /* warm yellow-sage, bright */
    --glow-buzzy:    255, 130, 30;     /* warm orange-amber, ember */
    --glow-shutdown:  88,  70, 200;    /* deep velvety indigo, warm */
    --glow-toomuch:  220, 180, 255;    /* clear soft lavender */
    --glow-heavy:    250, 158, 188;    /* soft rose */
  }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    /* match darkest deep-water tone in the photo so any seam disappears */
    background: #061824;
    color: var(--ink-soft);
    font-family: 'Cormorant Garamond', Georgia, serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  ::selection { background: rgba(207, 238, 242, 0.35); color: #fff; }
  button { font-family: inherit; color: inherit; appearance: none; border: none; background: transparent; cursor: pointer; padding: 0; }
  a { color: inherit; text-decoration: none; }

  /* ========== UNDERWATER PHOTO BACKGROUND ========== */
  .water-wrap {
    position: fixed; inset: -8% -6%; z-index: 0;
    overflow: hidden;
  }
  .water {
    position: absolute; inset: 0;
    background-image: url('assets/underwater.png');
    background-size: cover;
    /* keep the photo's bright surface visible up top, push the sandy floor below the viewport */
    background-position: center 18%;
    background-repeat: no-repeat;
    background-color: #061824;
    filter: url(#waterRipple);
    /* pulse forward — scale up gently, as if a wave is rolling toward the viewer */
    animation: waterApproach 9s ease-in-out infinite;
    transform-origin: 50% 22%;
  }
  /* a separate, brighter ripple band over just the surface area — really alive */
  .surface-ripple {
    position: absolute; top: 0; left: 0; right: 0; height: 50%;
    background-image: url('assets/underwater.png');
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    filter: url(#surfaceRipple) brightness(1.05);
    -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
            mask-image: linear-gradient(180deg, #000 0%, #000 55%, transparent 100%);
    mix-blend-mode: lighten;
    opacity: 0.85;
    /* surface pulse offset slightly from the main wave so they layer */
    animation: surfaceApproach 7s ease-in-out infinite;
    transform-origin: 50% 0%;
  }
  /* darken the lower half a little so cards have presence; bottom blends to body */
  .water-wrap::after {
    content: ''; position: absolute; inset: 0;
    background:
      /* strong bottom band that smooths through any remaining horizon line */
      linear-gradient(180deg,
        rgba(0,0,0,0) 0%,
        rgba(0,0,0,0) 40%,
        rgba(4, 18, 28, 0.35) 60%,
        rgba(4, 16, 24, 0.7) 80%,
        rgba(3, 12, 20, 0.92) 100%),
      radial-gradient(ellipse 140% 60% at 50% 110%, rgba(2, 12, 20, 0.7) 0%, rgba(2, 12, 20, 0.18) 55%, transparent 80%);
    pointer-events: none;
  }
  /* feels like a wave approaching: gentle radial scale-up + tiny downward settle, no lateral motion */
  @keyframes waterApproach {
    0%, 100% { transform: scale(1.045) translateY(0); }
    50%      { transform: scale(1.085) translateY(0.6%); }
  }
  @keyframes surfaceApproach {
    0%, 100% { transform: scale(1.02) translateY(0); }
    50%      { transform: scale(1.06) translateY(0.4%); }
  }

  /* a subtle warped overlay on top — caustic shimmer that pulses outward toward the viewer */
  .shimmer {
    position: fixed; inset: -5%; z-index: 1; pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.55;
    animation: shimmerApproach 8s ease-in-out infinite;
    transform-origin: 50% 15%;
  }
  .shimmer svg { width: 100%; height: 100%; display: block; }
  @keyframes shimmerApproach {
    0%, 100% { transform: scale(1.0); opacity: 0.42; }
    50%      { transform: scale(1.10); opacity: 0.72; }
  }

  /* light rays — grow toward the viewer instead of swaying side to side */
  .rays {
    position: fixed; inset: 0; z-index: 1; pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.55;
    animation: raysApproach 10s ease-in-out infinite;
    transform-origin: 50% 0%;
  }
  .rays svg { width: 100%; height: 100%; display: block; }
  @keyframes raysApproach {
    0%, 100% { transform: scale(1.0)  translateY(0); opacity: 0.42; }
    50%      { transform: scale(1.06) translateY(0.4%); opacity: 0.72; }
  }

  /* drifting motes — clearly perceptible */
  .motes {
    position: fixed; inset: 0; z-index: 2; pointer-events: none;
    overflow: hidden;
  }
  .mote {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(230,245,250,1) 0%, rgba(230,245,250,0) 70%);
    animation: moteRise var(--dur, 18s) linear infinite;
    animation-delay: var(--delay, 0s);
    opacity: 0;
  }
  @keyframes moteRise {
    0%   { transform: translate(0, 0); opacity: 0; }
    10%  { opacity: 0.9; }
    50%  { transform: translate(var(--mx, 12px), -45vh); opacity: 1; }
    90%  { opacity: 0.6; }
    100% { transform: translate(0, -100vh); opacity: 0; }
  }

  /* ========== PAGE LAYOUT — FIT TO VIEWPORT, NO SCROLL ========== */
  .page {
    position: relative; z-index: 5;
    width: 100vw; height: 100vh;
    padding: 56px 56px 40px 110px;
    display: grid;
    grid-template-rows: auto 1fr;
    align-items: start;
    justify-items: center;
    row-gap: clamp(28px, 5vh, 60px);
  }

  /* side rail */
  .rail {
    position: fixed; top: 0; left: 0; bottom: 0; width: 80px;
    z-index: 20;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 22px;
    padding: 24px 0 80px;
  }
  .rail-item {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    text-align: center;
    color: rgba(220, 232, 238, 0.55);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 12px;
    line-height: 1.15;
    letter-spacing: 0.02em;
    width: 64px;
    transition: color 220ms;
  }
  .rail-item .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--rail-dot, #6c8590);
    box-shadow: 0 0 10px var(--rail-glow, rgba(108, 133, 144, 0.6));
    transition: transform 220ms, box-shadow 220ms;
  }
  .rail-item.active { color: #f4f8fa; }
  .rail-item.active .dot {
    transform: scale(1.5);
    box-shadow: 0 0 18px var(--rail-glow);
  }
  .rail-item:hover { color: #f4f8fa; }
  .back-rail {
    position: absolute; bottom: 22px; left: 50%; transform: translateX(-50%);
    text-align: center;
    color: rgba(220, 232, 238, 0.55);
    font-family: 'Cormorant Garamond', serif; font-style: italic;
    font-size: 11px; line-height: 1.3;
    width: 70px;
  }
  .back-rail .arrow { display: block; font-size: 14px; margin-bottom: 4px; }

  /* ========== HEADER ========== */
  .heading {
    text-align: center;
    margin: 0;
    padding-top: 6px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    line-height: 1.2;
    /* contrast against the bright surface pool — give it a soft dark bloom */
    text-shadow:
      0 1px 2px rgba(0, 16, 24, 0.6),
      0 2px 18px rgba(0, 16, 24, 0.55),
      0 0 32px rgba(2, 16, 24, 0.45);
  }
  .heading .breathe {
    display: block;
    font-size: 42px;
    font-weight: 300;
    color: #f8fafb;
    letter-spacing: 0.01em;
  }
  .heading .where {
    display: block;
    font-size: 26px;
    font-weight: 300;
    color: rgba(232, 244, 248, 0.88);
    margin-top: 4px;
    letter-spacing: 0.01em;
  }
  /* dark vignette behind heading text only — improves legibility against bright water */
  .heading::before {
    content: '';
    position: absolute;
    top: 8px; left: 50%; transform: translateX(-50%);
    width: 520px; height: 130px;
    background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(0, 14, 22, 0.45) 0%, rgba(0, 14, 22, 0.18) 55%, transparent 80%);
    pointer-events: none;
    z-index: -1;
    filter: blur(8px);
  }

  .header-wrap { position: relative; }

  /* ========== DIE-PIP GRID — five equal cards, equal gaps ========== */
  .pip {
    --gap: clamp(22px, 3.4vw, 50px);
    --card-w: clamp(180px, 18.5vw, 250px);
    --card-h: clamp(96px, 9.5vh, 130px);
    width: calc(var(--card-w) * 3 + var(--gap) * 2);
    height: calc(var(--card-h) * 3 + var(--gap) * 2);
    max-height: calc(100vh - 220px);
    position: relative;
    display: grid;
    grid-template-columns: var(--card-w) var(--card-w) var(--card-w);
    grid-template-rows:    var(--card-h) var(--card-h) var(--card-h);
    gap: var(--gap);
    place-content: center;
    align-self: center;
  }
  /* corners + center */
  .pos-tl { grid-column: 1; grid-row: 1; }
  .pos-tr { grid-column: 3; grid-row: 1; }
  .pos-c  { grid-column: 2; grid-row: 2; }
  .pos-bl { grid-column: 1; grid-row: 3; }
  .pos-br { grid-column: 3; grid-row: 3; }

  /* ========== STATE CARD ========== */
  .card {
    position: relative;
    width: 100%; height: 100%;
    border-radius: 22px;
    cursor: pointer;
    overflow: visible;
    isolation: isolate;
    /* deep base — slightly tinted by glow color */
    background:
      radial-gradient(ellipse 120% 100% at var(--gx, 50%) var(--gy, 50%),
        rgba(var(--c), 0.12) 0%,
        rgba(8, 12, 20, 0.96) 60%,
        rgba(2, 5, 10, 1) 100%);
    box-shadow:
      0 26px 48px -8px rgba(0, 0, 0, 0.75),
      0 14px 26px rgba(0, 0, 0, 0.55),
      0 2px 6px rgba(0, 0, 0, 0.4);
    transition: transform 360ms cubic-bezier(0.2, 0.8, 0.2, 1), box-shadow 360ms;
  }
  .card:hover {
    transform: translateY(-4px) scale(1.018);
  }

  /* the inner glow body — much brighter, like an ember */
  .glow {
    position: absolute; inset: 0;
    border-radius: inherit;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
    animation: cardBreathe 5.5s ease-in-out infinite;
  }
  .glow::before {
    /* the main ember body */
    content: ''; position: absolute; inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(ellipse 95% 95% at var(--gx, 50%) var(--gy, 50%),
        rgba(var(--c), 1)    0%,
        rgba(var(--c), 0.85) 8%,
        rgba(var(--c), 0.6)  20%,
        rgba(var(--c), 0.32) 38%,
        rgba(var(--c), 0.12) 60%,
        transparent 85%);
    mix-blend-mode: screen;
  }
  .glow::after {
    /* hot core highlight */
    content: ''; position: absolute; inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(circle 38% at var(--gx, 50%) var(--gy, 50%),
        rgba(255, 250, 240, 0.85) 0%,
        rgba(var(--c), 0.7) 18%,
        rgba(var(--c), 0.25) 45%,
        transparent 70%);
    mix-blend-mode: screen;
    opacity: 0.85;
  }

  /* outer aura — color spilling beyond the card, into the water */
  .aura {
    position: absolute; inset: -28px;
    border-radius: 38px;
    pointer-events: none;
    z-index: 0;
    background: radial-gradient(ellipse 80% 70% at var(--gx, 50%) var(--gy, 50%),
      rgba(var(--c), 0.55) 0%,
      rgba(var(--c), 0.22) 35%,
      rgba(var(--c), 0.06) 60%,
      transparent 80%);
    filter: blur(14px);
    mix-blend-mode: screen;
    animation: cardBreathe 5.5s ease-in-out infinite;
  }

  /* pillowed top highlight — subtle */
  .card::before {
    content: ''; position: absolute; inset: 0;
    border-radius: inherit;
    background:
      linear-gradient(180deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.02) 16%, transparent 35%),
      radial-gradient(ellipse 90% 25% at 50% 0%, rgba(255, 255, 255, 0.08), transparent 70%);
    pointer-events: none;
    z-index: 3;
  }
  /* edge stroke + inner shading */
  .card::after {
    content: ''; position: absolute; inset: 0;
    border-radius: inherit;
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.10),
      inset 0 -2px 4px rgba(0, 0, 0, 0.4),
      inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    pointer-events: none;
    z-index: 4;
  }

  /* card label */
  .label {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    padding: 14px 18px;
    z-index: 5;
    text-align: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(15px, 1.3vw, 19px);
    letter-spacing: 0.01em;
    line-height: 1.25;
    color: rgba(252, 248, 240, 0.98);
    text-shadow:
      0 1px 2px rgba(0,0,0,0.7),
      0 0 18px rgba(var(--c), 0.45);
    text-wrap: pretty;
  }
  .label .em {
    font-style: italic;
    color: rgba(255, 252, 244, 1);
  }

  /* glow placement per card — inner corner faces the centre */
  .card.frazzled { --c: var(--glow-frazzled); --gx: 78%; --gy: 78%; }
  .card.buzzy    { --c: var(--glow-buzzy);    --gx: 22%; --gy: 78%; }
  .card.shutdown { --c: var(--glow-shutdown); --gx: 50%; --gy: 50%; }
  .card.toomuch  { --c: var(--glow-toomuch);  --gx: 78%; --gy: 22%; }
  .card.heavy    { --c: var(--glow-heavy);    --gx: 22%; --gy: 22%; }

  /* shutdown is the source — strongest glow */
  .card.shutdown .glow::before {
    background:
      radial-gradient(ellipse 100% 100% at 50% 50%,
        rgba(var(--c), 1)    0%,
        rgba(var(--c), 0.9)  10%,
        rgba(var(--c), 0.65) 28%,
        rgba(var(--c), 0.32) 52%,
        rgba(var(--c), 0.10) 75%,
        transparent 92%);
  }
  .card.shutdown .aura {
    inset: -36px;
    background: radial-gradient(circle at 50% 50%,
      rgba(var(--c), 0.7) 0%,
      rgba(var(--c), 0.32) 35%,
      rgba(var(--c), 0.10) 65%,
      transparent 82%);
    filter: blur(18px);
  }
  .card.shutdown .label {
    letter-spacing: 0.05em;
    text-transform: lowercase;
    font-size: clamp(14px, 1.2vw, 18px);
  }

  /* synchronized breathing */
  @keyframes cardBreathe {
    0%, 100% { opacity: 0.78; transform: scale(1); }
    50%      { opacity: 1.05; transform: scale(1.02); }
  }

  /* responsive — small screens get scrollable fallback */
  @media (max-width: 760px) {
    html, body { overflow-y: auto; }
    .page { height: auto; min-height: 100vh; padding: 32px 16px 80px 16px; }
    .rail { display: none; }
    .pip {
      width: 100%; max-width: 460px; height: auto;
      --card-w: minmax(0, 1fr);
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto auto auto;
      gap: 16px;
    }
    .pip .card { aspect-ratio: 1.4 / 1; height: auto; }
    .pos-tl { grid-column: 1; grid-row: 1; }
    .pos-tr { grid-column: 2; grid-row: 1; }
    .pos-c  { grid-column: 1 / span 2; grid-row: 2; }
    .pos-bl { grid-column: 1; grid-row: 3; }
    .pos-br { grid-column: 2; grid-row: 3; }
  }
</style>
</head>
<body>

<!-- SVG filters for the water ripple — strong enough to be clearly perceptible -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <filter id="waterRipple" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.014 0.024" numOctaves="2" seed="4" result="noise">
        <!-- frequency drifts gently; no horizontal scrolling — pulses radially via the displacement scale -->
        <animate attributeName="baseFrequency" dur="14s" values="0.014 0.024;0.018 0.030;0.014 0.024" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="14">
        <!-- the displacement scale itself swells and recedes — reads as waves coming toward you -->
        <animate attributeName="scale" dur="9s" values="8;22;8" repeatCount="indefinite" />
      </feDisplacementMap>
    </filter>
    <filter id="surfaceRipple" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.020 0.048" numOctaves="2" seed="9" result="snoise">
        <animate attributeName="baseFrequency" dur="10s" values="0.020 0.048;0.026 0.062;0.020 0.048" repeatCount="indefinite" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="snoise" scale="28">
        <animate attributeName="scale" dur="7s" values="18;42;18" repeatCount="indefinite" />
      </feDisplacementMap>
    </filter>
  </defs>
</svg>

<!-- background scene -->
<div class="water-wrap">
  <div class="water"></div>
  <div class="surface-ripple"></div>
</div>

<!-- caustic shimmer overlay -->
<div class="shimmer" aria-hidden="true">
  <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
    <defs>
      <filter id="shim" x="-10%" y="-10%" width="120%" height="120%">
        <feTurbulence type="fractalNoise" baseFrequency="0.008 0.014" numOctaves="2" seed="11">
          <animate attributeName="baseFrequency" dur="14s" values="0.008 0.014;0.012 0.02;0.008 0.014" repeatCount="indefinite" />
        </feTurbulence>
        <feColorMatrix values="0 0 0 0 0.85
                               0 0 0 0 0.95
                               0 0 0 0 1
                               0 0 0 0.7 0" />
        <feGaussianBlur stdDeviation="2" />
      </filter>
    </defs>
    <rect x="0" y="0" width="1600" height="380" filter="url(#shim)" opacity="0.9" />
    <rect x="0" y="380" width="1600" height="300" filter="url(#shim)" opacity="0.4" />
  </svg>
</div>

<!-- volumetric light rays -->
<div class="rays" aria-hidden="true">
  <svg viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="rayGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%"  stop-color="#e6f8fa" stop-opacity="0.6" />
        <stop offset="40%" stop-color="#9ed5dc" stop-opacity="0.22" />
        <stop offset="100%" stop-color="#9ed5dc" stop-opacity="0" />
      </linearGradient>
      <filter id="raySoft" x="-10%" y="-10%" width="120%" height="120%">
        <feGaussianBlur stdDeviation="10" />
      </filter>
    </defs>
    <g filter="url(#raySoft)">
      <polygon points="700,0 900,0 1200,1000 400,1000" fill="url(#rayGrad)" opacity="0.7" />
      <polygon points="540,0 600,0 760,1000 360,1000" fill="url(#rayGrad)" opacity="0.4" />
      <polygon points="990,0 1060,0 1240,1000 840,1000" fill="url(#rayGrad)" opacity="0.45" />
      <polygon points="780,0 820,0 920,1000 660,1000" fill="url(#rayGrad)" opacity="0.6" />
      <polygon points="860,0 905,0 1010,1000 760,1000" fill="url(#rayGrad)" opacity="0.5" />
    </g>
  </svg>
</div>

<!-- suspended motes — drift upward visibly -->
<div class="motes" aria-hidden="true">
  <div class="mote" style="left: 12%; top: 80%; --dur: 22s; --delay: 0s;  --mx: 14px;"></div>
  <div class="mote" style="left: 22%; top: 90%; --dur: 26s; --delay: 4s;  --mx: -10px;"></div>
  <div class="mote" style="left: 35%; top: 75%; --dur: 20s; --delay: 9s;  --mx: 16px;"></div>
  <div class="mote" style="left: 48%; top: 95%; --dur: 28s; --delay: 6s;  --mx: -18px;"></div>
  <div class="mote" style="left: 62%; top: 85%; --dur: 24s; --delay: 12s; --mx: 12px;"></div>
  <div class="mote" style="left: 74%; top: 92%; --dur: 26s; --delay: 9s;  --mx: -8px;"></div>
  <div class="mote" style="left: 86%; top: 78%; --dur: 22s; --delay: 16s; --mx: 14px;"></div>
  <div class="mote" style="left: 92%; top: 88%; --dur: 28s; --delay: 14s; --mx: -12px;"></div>
  <div class="mote" style="left: 6%;  top: 70%; --dur: 30s; --delay: 18s; --mx: 18px;"></div>
  <div class="mote" style="left: 55%; top: 82%; --dur: 24s; --delay: 21s; --mx: -14px;"></div>
</div>

<!-- side rail -->
<aside class="rail" aria-label="rooms">
  <a class="rail-item" href="Cat and Co - Enchanted Garden.html#almanac" style="--rail-dot:#e8c87c;--rail-glow:rgba(232,200,124,0.55);">
    <span class="dot"></span>Energy<br/>Tracker
  </a>
  <a class="rail-item" href="Cat and Co - Enchanted Garden.html#sparks" style="--rail-dot:#e35a4a;--rail-glow:rgba(227,90,74,0.55);">
    <span class="dot"></span>Sparks
  </a>
  <a class="rail-item active" href="#" style="--rail-dot:#9ed5dc;--rail-glow:rgba(158,213,220,0.85);">
    <span class="dot"></span>First Aid
  </a>
  <a class="rail-item" href="Cat and Co - Enchanted Garden.html#games" style="--rail-dot:#76c79a;--rail-glow:rgba(118,199,154,0.55);">
    <span class="dot"></span>Games
  </a>
  <a class="rail-item" href="Cat and Co - Enchanted Garden.html#threads" style="--rail-dot:#b69aea;--rail-glow:rgba(182,154,234,0.55);">
